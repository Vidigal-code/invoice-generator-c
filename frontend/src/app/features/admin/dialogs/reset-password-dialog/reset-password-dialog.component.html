<h2 mat-dialog-title>Redefinir Senha — {{ data.username }}</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Nova Senha</mat-label>
    <input matInput type="password" [(ngModel)]="newPassword" minlength="6">
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="ref.close(null)">Cancelar</button>
  <button mat-raised-button color="warn" (click)="ref.close(newPassword)" [disabled]="newPassword.length < 6">Redefinir</button>
</mat-dialog-actions>
