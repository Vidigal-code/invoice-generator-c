<h2 mat-dialog-title>Histórico do contrato — {{ data.contractNumber }}</h2>
<mat-dialog-content class="hist-content">
  <table mat-table [dataSource]="data.rows" class="hist-table" *ngIf="data.rows?.length">
    <ng-container matColumnDef="occurredAt">
      <th mat-header-cell *matHeaderCellDef>Data</th>
      <td mat-cell *matCellDef="let r">{{ r.occurredAt | date:'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>
    <ng-container matColumnDef="changeType">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell *matCellDef="let r">{{ r.changeType }}</td>
    </ng-container>
    <ng-container matColumnDef="payloadJson">
      <th mat-header-cell *matHeaderCellDef>Detalhe (JSON)</th>
      <td mat-cell *matCellDef="let r"><pre class="payload-pre">{{ r.payloadJson }}</pre></td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="historyColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: historyColumns;"></tr>
  </table>
  <p *ngIf="!data.rows?.length" class="empty-hist">Nenhuma alteração registada ainda.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Fechar</button>
</mat-dialog-actions>
