services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        ANGULAR_API_URL: /api
        ANGULAR_APP_TITLE: Invoice Generator
    ports:
      - "8081:80"
    depends_on:
      - api
